# ===========================================================================
# DigitalOcean App Platform spec — custom FrankerFaceZ client (this repo)
# ===========================================================================
# Hosts YOUR custom build. The client still pulls DATA + static assets from
# FFZ's own infra (api / cdn / cdn2.frankerfacez.com) — only the code bundle is
# served from here. Validate against the current app spec:
#   https://docs.digitalocean.com/products/app-platform/reference/app-spec/
# Replace the TODO domains before deploying.
# ===========================================================================

name: ffz-client
region: nyc

static_sites:
  - name: client
    github:
      repo: smokey019/FrankerFaceZ
      branch: master
      deploy_on_push: true

    # bun is detected from packageManager (bun@1.3.10) / bun.lock.
    build_command: bun install --frozen-lockfile && bun run build
    output_dir: dist

    # Build-time: where this app is served (your code host). It's baked into the
    # loader (src/entry.js) and the webpack publicPath. Set it to this app's
    # domain so the loader + chunks resolve to your DO host.
    envs:
      - key: FFZ_CDN
        scope: BUILD_TIME
        value: https://frankerfacez-fork-pizrb.ondigitalocean.app   # your DO app domain (no trailing slash)

# Using DO's default domain (frankerfacez-fork-pizrb.ondigitalocean.app). To use
# your own domain, add a `domains:` block here and point FFZ_CDN at it. The
# userscript install URL is: https://<domain>/script/script.min.js

# The client is loaded cross-origin from twitch.tv: scripts use
# crossorigin="anonymous" AND @font-face fonts are always CORS-checked, so every
# asset must be served with CORS or the browser blocks it (the exact error you
# get without this). These are public, credential-less assets.
#
# NOTE: this `ingress` is what adds the Access-Control-Allow-Origin header. If
# your live app was created via the dashboard, it won't have this block — add it
# (matching your component's name) under Settings -> App Spec, or apply this
# whole file with `doctl apps update <id> --spec .do/app.yaml`.
ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: client
      cors:
        allow_origins:
          - regex: "^https://([a-z0-9-]+\\.)?twitch\\.tv$"
        allow_methods:
          - GET
          - HEAD
        allow_headers:
          - "*"
