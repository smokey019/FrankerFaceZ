name: Build Main Client

on:
  push:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Uses Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install Dependencies
      run: bun install --frozen-lockfile

    - name: Build the Client
      run: bun run build

    - name: Create Archive
      id: artifact-upload-setp
      uses: actions/upload-artifact@v4
      with:
        name: client
        path: |
          dist

    # Distribution is handled by DigitalOcean App Platform (it builds from this
    # repo on push). This workflow only validates the build and publishes an
    # artifact; the upstream FFZ SSH/SCP deploy has been removed.
