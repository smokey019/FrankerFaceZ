name: Build Main Client

on:
  push:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Uses Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install Dependencies
      run: bun install --frozen-lockfile

    - name: Build the Client
      run: bun run build

    - name: Create Archive
      id: artifact-upload-setp
      uses: actions/upload-artifact@v4
      with:
        name: client
        path: |
          dist

    # Deployment is handled by DigitalOcean App Platform, which builds this repo
    # directly from the connected branch with FFZ_CDN / FFZ_API set in the app's
    # build environment (see .do/app.yaml). This workflow only validates the
    # build and publishes an artifact; the previous SSH/SCP deploy to the
    # upstream FrankerFaceZ host has been removed for the standalone fork.
